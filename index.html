<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Resto Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white font-sans">

<header class="flex justify-between items-center p-5 bg-gray-800 shadow">
  <h1 class="text-2xl font-bold text-yellow-400">🍽 Resto Pro</h1>
  <a href="login.html" class="bg-yellow-400 text-black px-4 py-2 rounded">Connexion</a>
</header>

<section class="text-center py-20">
  <h2 class="text-5xl font-bold">Bienvenue 👨‍🍳</h2>
  <p class="mt-4 text-gray-400">Gestion moderne de votre restaurant</p>
</section>

<section id="menu" class="grid md:grid-cols-3 gap-5 p-10"></section>

<script>
let plats = JSON.parse(localStorage.getItem("plats")) || [];

const menu = document.getElementById("menu");

plats.forEach(p=>{
  let div = document.createElement("div");

  div.className = "bg-gray-800 p-5 rounded-xl shadow text-center";

  div.innerHTML = `
    <h3 class="text-xl font-bold">${p.nom}</h3>
    <p class="text-yellow-400">${p.prix} FC</p>
    <p class="${p.stock <= 3 ? 'text-red-400' : 'text-green-400'}">
      Stock: ${p.stock}
    </p>
  `;

  menu.appendChild(div);
});
</script>

</body>
</html>
