<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex justify-center items-center h-screen bg-gray-900">

<div class="bg-gray-800 p-10 rounded-xl shadow w-80 text-white">
  <h2 class="text-2xl font-bold mb-5 text-center">Connexion</h2>

  <input id="username" placeholder="Nom"
    class="border p-2 w-full mb-3 text-black rounded">

  <input id="password" type="password" placeholder="Mot de passe"
    class="border p-2 w-full mb-3 text-black rounded">

  <p id="msg" class="text-red-400 text-sm"></p>

  <button onclick="login()"
    class="bg-yellow-400 text-black w-full p-2 mt-3 rounded font-bold">
    Connexion
  </button>
</div>

<script src="dashboard.js"></script>
</body>
</html>
