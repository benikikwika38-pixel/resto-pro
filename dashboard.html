<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white">

<div class="flex justify-between p-5 bg-gray-800">
  <h1 class="text-yellow-400 text-xl">🍽 Resto Pro</h1>
  <p id="welcome"></p>
</div>

<div class="grid md:grid-cols-3 gap-5 p-5">

<div class="bg-gray-800 p-5 rounded">
<h2>Ajouter commande</h2>

<select id="platSelect" class="w-full p-2 text-black"></select>

<div class="flex justify-center mt-2">
<button onclick="moins()" class="bg-red-500 px-3">-</button>
<input id="quantite" value="1" class="w-10 text-center text-black">
<button onclick="plus()" class="bg-green-500 px-3">+</button>
</div>

<button onclick="ajouterCommande()" class="bg-yellow-400 w-full mt-3 p-2 text-black">
Ajouter
</button>
</div>

<div class="bg-gray-800 p-5 rounded md:col-span-2">
<h2>Commandes</h2>
<ul id="list"></ul>
</div>

</div>

<div class="grid md:grid-cols-2 gap-5 p-5">

<div class="bg-green-600 p-5 text-center">
<h2>Total</h2>
<p id="total"></p>
</div>

<div class="bg-gray-800 p-5">
<h2>Historique</h2>
<div id="calendarList"></div>
</div>

</div>

<button onclick="resetStock()" class="bg-blue-500 m-5 p-2">
Reset Stock
</button>

<script src="dashboard.js"></script>
</body>
</html>
