<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="p-10 bg-gray-100 font-sans">

<h1 class="text-3xl font-bold mb-5">Dashboard</h1>
<p id="welcome" class="mb-5"></p>

<h2 class="font-bold">Ajouter commande</h2>
<select id="platSelect" class="border p-2"></select>
<input id="quantite" type="number" class="border p-2" placeholder="Quantité">
<button onclick="ajouterCommande()" class="bg-green-600 text-white p-2 rounded">Ajouter</button>

<h2 class="mt-5 font-bold">Commandes</h2>
<ul id="list" class="mt-2"></ul>

<h2 class="mt-5 font-bold">Total ventes :</h2>
<p id="total"></p>

<h2 class="mt-10 font-bold">Statistiques</h2>
<canvas id="chart"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
